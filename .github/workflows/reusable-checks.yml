name: Benchmark Smoke

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: python -m pip install -e . --no-build-isolation

      - name: Benchmark environment
        run: python scripts/benchmark_env.py --config configs/tasks/hover.toml --steps 64
